  update-homebrew-cask:
    name: Update Homebrew Cask
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-tray-mac
    steps:
      - name: Download arm64 DMG
        uses: robinraju/release-downloader@v1.11
        with:
          tag: ${{ github.ref_name }}
          fileName: locallens-agent-${{ github.ref_name }}-macos-arm64.dmg
          out-file-path: dmg_downloads

      - name: Compute SHA256 checksum
        id: sha
        run: |
          ARM64_SHA=$(shasum -a 256 "dmg_downloads/locallens-agent-${{ github.ref_name }}-macos-arm64.dmg" | awk '{print $1}')
          echo "arm64=$ARM64_SHA" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ashesbloom/homebrew-locallens
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Cask formula
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          ARM64_SHA="${{ steps.sha.outputs.arm64 }}"

          CASK="homebrew-tap/Casks/locallens-agent.rb"

          # Bootstrap the cask file if it does not yet exist in the tap repo
          if [ ! -f "$CASK" ]; then
            mkdir -p "$(dirname "$CASK")"
            {
              printf 'cask "locallens-agent" do\n'
              printf '  version "PLACEHOLDER_VERSION"\n'
              printf '\n'
              printf '  url "https://github.com/ashesbloom/locallens_mcp_agent/releases/download/v#{version}/locallens-agent-v#{version}-macos-arm64.dmg"\n'
              printf '  sha256 "PLACEHOLDER_SHA"\n'
              printf '\n'
              printf '  name "LocalLens Agent"\n'
              printf '  desc "System tray agent for LocalLens privacy-first photo organizer"\n'
              printf '  homepage "https://locallens.app"\n'
              printf '\n'
              printf '  app "LocalLens Agent.app"\n'
              printf '\n'
              printf '  zap trash: [\n'
              printf '    "~/.config/LocalLens",\n'
              printf '  ]\n'
              printf 'end\n'
            } > "$CASK"
            echo "Bootstrapped new cask file from template"
          fi

          # Replace version and sha256 values in-place
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$CASK"
          sed -i "s/sha256 \".*\"/sha256 \"${ARM64_SHA}\"/" "$CASK"

          echo "Updated Cask to v${VERSION}"
          cat "$CASK"

      - name: Commit and push Cask update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/locallens-agent.rb
          git commit -m "chore: update locallens-agent to ${{ github.ref_name }}"
          git push
