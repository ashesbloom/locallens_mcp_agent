name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Binary (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 (Apple Silicon). Rosetta 2 runs this natively on Intel Macs too.
          # macos-13 (Intel) is excluded — GitHub has deprecated that runner pool
          # and jobs queue indefinitely waiting for an unavailable runner.
          - os: macos-latest
            arch: arm64
            artifact_name: locallens-mcp
            asset_suffix: macos-arm64
            archive_cmd: zip -j locallens-mcp-${{ github.ref_name }}-macos-arm64.zip dist/locallens-mcp
            archive_file: locallens-mcp-${{ github.ref_name }}-macos-arm64.zip
          - os: windows-latest
            arch: x86_64
            artifact_name: locallens-mcp.exe
            asset_suffix: windows-x86_64
            archive_cmd: Compress-Archive -Path dist/locallens-mcp.exe -DestinationPath locallens-mcp-${{ github.ref_name }}-windows-x86_64.zip
            archive_file: locallens-mcp-${{ github.ref_name }}-windows-x86_64.zip
          - os: ubuntu-22.04
            arch: x86_64
            artifact_name: locallens-mcp
            asset_suffix: linux-x86_64
            archive_cmd: tar -czf locallens-mcp-${{ github.ref_name }}-linux-x86_64.tar.gz -C dist locallens-mcp
            archive_file: locallens-mcp-${{ github.ref_name }}-linux-x86_64.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Build binary with PyInstaller
        run: |
          pyinstaller locallens-mcp.spec

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: ${{ matrix.archive_cmd }}

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.archive_cmd }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tray-mac:
    name: Build Tray App (macOS - arm64)
    runs-on: macos-latest
    timeout-minutes: 45
    # Single arm64 build. Apple Silicon is 90%+ of active Macs.
    # Rosetta 2 runs this binary transparently on Intel hardware.
    # macos-13 (Intel runner) is excluded — GitHub deprecated that pool;
    # jobs queue indefinitely waiting for an unavailable runner.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[tray]" py2app

      - name: Build tray .app bundle
        # py2app uses setup_tray_mac.py (distutils-style), which conflicts with
        # pyproject.toml when both exist in the same directory. We temporarily
        # rename pyproject.toml so py2app's modulegraph doesn't choke on it.
        timeout-minutes: 30
        run: |
          mv pyproject.toml pyproject.toml.bak
          python setup_tray_mac.py py2app
          mv pyproject.toml.bak pyproject.toml

      - name: Ad-hoc sign the app bundle
        # This is NOT a full Apple notarization (which requires a paid Developer
        # account), but it removes the "app is damaged" error and is required for
        # the xattr quarantine removal in the Homebrew Cask to work reliably.
        # Full notarization can be layered on later by adding APPLE_CERTIFICATE
        # secrets — the signing step below would be replaced by a proper identity.
        run: |
          codesign --deep --force --sign - "dist/LocalLens Agent.app"

      - name: Build DMG (with app + Gatekeeper fix script)
        # The fix_locallens_agent.command file is bundled inside the DMG so that
        # users who install manually can just double-click it — no Terminal needed.
        run: |
          chmod +x fix_locallens_agent.command

          # Stage DMG contents: app + fix script
          mkdir -p dmg_staging
          cp -r "dist/LocalLens Agent.app" dmg_staging/
          cp fix_locallens_agent.command "dmg_staging/Fix LocalLens Agent.command"

          hdiutil create \
            -volname "LocalLens Agent" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "locallens-agent-${{ github.ref_name }}-macos-arm64.dmg"

      - name: Upload tray DMG
        uses: softprops/action-gh-release@v2
        with:
          files: locallens-agent-${{ github.ref_name }}-macos-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tray-win:
    name: Build Tray App (Windows - x86_64)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[tray]" pyinstaller

      - name: Build tray app with PyInstaller
        run: pyinstaller locallens-tray-win.spec

      - name: Build locallens-mcp.exe and bundle it alongside the tray
        # get_mcp_command_config() (claude_connector.py) looks for
        # locallens-mcp.exe next to the tray's own executable when running
        # as a bundled PyInstaller build. Without it, "Connect to Claude"
        # falls through to a PATH search and fails on machines that never
        # separately pip-installed locallens-mcp.
        shell: pwsh
        run: |
          pyinstaller locallens-mcp.spec
          Copy-Item "dist\locallens-mcp.exe" "dist\LocalLens Agent\locallens-mcp.exe"

      - name: Verify PyInstaller output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\LocalLens Agent\LocalLens Agent.exe")) {
            Write-Error "PyInstaller output not found at dist\LocalLens Agent\"
            Get-ChildItem dist -Recurse | Select-Object FullName
            exit 1
          }
          if (-not (Test-Path "dist\LocalLens Agent\locallens-mcp.exe")) {
            Write-Error "locallens-mcp.exe was not bundled into dist\LocalLens Agent\"
            exit 1
          }
          Write-Host "PyInstaller output OK:"
          Get-ChildItem "dist\LocalLens Agent" | Select-Object Name, Length

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build NSIS installer
        shell: pwsh
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DAPP_VERSION=${{ github.ref_name }} installer_win.nsi
          Move-Item locallens-agent-installer.exe "locallens-agent-${{ github.ref_name }}-windows-x86_64-setup.exe"

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          files: locallens-agent-${{ github.ref_name }}-windows-x86_64-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

